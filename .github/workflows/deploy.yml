name: Deploy to Alibaba Cloud SAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.ALIBABA_SERVER_IP }}
          username: ${{ secrets.ALIBABA_SERVER_USER }}
          key: ${{ secrets.ALIBABA_SSH_KEY }}
          password: ${{ secrets.ALIBABA_SERVER_PASSWORD }}
          script: |
            set -e
            
            # Ensure directory exists and navigate to it
            mkdir -p /opt/RideFare-Qwen
            cd /opt/RideFare-Qwen
            
            # Initialize git if it's not already a repository
            if [ ! -d ".git" ]; then
              git init
              # Use the built-in GITHUB_TOKEN to authenticate automatically
              git remote add origin https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            fi
            
            # Pull the latest changes
            git fetch origin main
            git reset --hard origin/main
            
            # Build and restart the containers
            docker compose build
            docker compose down
            docker compose up -d
            
            echo "Deployment successful! The Qwen AI RideFare agents are live."
